name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOCKER_BUILDKIT: "1"
  BUILDKIT_INLINE_CACHE: "1"
  DOCKER_DRIVER: overlay2
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --cache-dir "$PIP_CACHE_DIR" -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          echo "Запуск тестов..."
          pytest --junitxml=report.xml --cov=. --cov-report=xml:coverage.xml --cov-fail-under=70

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            report.xml
            coverage.xml

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        run: |
          IMAGE_NAME_LC="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME_LC=$IMAGE_NAME_LC" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_REGISTRY}/${IMAGE_NAME_LC}:${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_LATEST=${IMAGE_REGISTRY}/${IMAGE_NAME_LC}:latest" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          echo "Сборка Docker образа..."

          if [ ! -f "Dockerfile" ]; then
            echo "Dockerfile не найден"
            exit 1
          fi

          docker build \
            -t "$IMAGE_TAG" \
            -t "$IMAGE_TAG_LATEST" \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VERSION="${GITHUB_SHA}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            .

          echo "Проверка созданного образа..."
          if docker image inspect "$IMAGE_TAG" > /dev/null 2>&1; then
            echo "Образ успешно создан: $IMAGE_TAG"
          else
            echo "Ошибка: образ не создан"
            exit 1
          fi

          docker save "$IMAGE_TAG" "$IMAGE_TAG_LATEST" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          if-no-files-found: error

  test-build:
    name: test-build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Prepare image metadata
        run: |
          IMAGE_NAME_LC="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME_LC=$IMAGE_NAME_LC" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_REGISTRY}/${IMAGE_NAME_LC}:${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_LATEST=${IMAGE_REGISTRY}/${IMAGE_NAME_LC}:latest" >> "$GITHUB_ENV"

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Run integration check
        run: |
          echo "Тестирование API"

          docker network create ci-network 2>/dev/null || true
          docker rm -f test-db test-app 2>/dev/null || true

          echo "Запускаем PostgreSQL..."
          docker run -d --name test-db --network ci-network \
            -e POSTGRES_DB=test_db \
            -e POSTGRES_USER=test_user \
            -e POSTGRES_PASSWORD=test_password \
            postgres:15-alpine

          echo "Ждем запуска PostgreSQL..."
          for i in $(seq 1 30); do
            if docker exec test-db pg_isready -U test_user -d test_db > /dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "Запуск контейнера..."
          docker run -d --name test-app --network ci-network \
            -e DATABASE_URL="postgresql://test_user:test_password@test-db:5432/test_db" \
            -p 8080:8080 \
            "$IMAGE_TAG"

          echo "Ждем запуска приложения..."
          for i in $(seq 1 30); do
            RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health/ 2>/dev/null || echo "000")
            if [ "$RESPONSE_CODE" = "200" ]; then
              break
            fi
            sleep 2
          done

          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health/ 2>/dev/null || echo "000")
          if [ "$RESPONSE_CODE" != "200" ]; then
            echo "Приложение не отвечает"
            docker logs test-app
            exit 1
          fi

          if docker logs test-app 2>&1 | grep -q "Application startup complete\|Server started at\|Uvicorn running"; then
            echo "Приложение успешно запустилось"
          else
            echo "Приложение не запустилось"
            docker logs test-app
            exit 1
          fi

          docker stop test-app test-db
          docker rm test-app test-db
          docker network rm ci-network 2>/dev/null || true

          echo "Тестирование завершено успешно!"

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f test-app test-db 2>/dev/null || true
          docker network rm ci-network 2>/dev/null || true

  publish-image:
    name: publish-image
    runs-on: ubuntu-latest
    needs: test-build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Prepare image metadata
        run: |
          IMAGE_NAME_LC="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME_LC=$IMAGE_NAME_LC" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_REGISTRY}/${IMAGE_NAME_LC}:${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_LATEST=${IMAGE_REGISTRY}/${IMAGE_NAME_LC}:latest" >> "$GITHUB_ENV"

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        run: |
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_TAG_LATEST"

  k8s-smoke:
    name: k8s-smoke
    runs-on: ubuntu-latest
    needs: publish-image
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    env:
      K8S_NAMESPACE: default
      K8S_KUSTOMIZE_PATH: k8s/kustomization/overlays/dev
      KIND_CLUSTER_NAME: kind

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Prepare image metadata
        run: |
          IMAGE_NAME_LC="$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME_LC=$IMAGE_NAME_LC" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_REGISTRY}/${IMAGE_NAME_LC}:${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_LATEST=${IMAGE_REGISTRY}/${IMAGE_NAME_LC}:latest" >> "$GITHUB_ENV"

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Set up kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Load app image into kind
        run: |
          kind load docker-image "$IMAGE_TAG" --name "$KIND_CLUSTER_NAME"

      - name: Install ingress-nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
          kubectl -n ingress-nginx wait --for=condition=ready pod -l app.kubernetes.io/component=controller --timeout=240s

      - name: Generate secret from GitHub Secrets
        env:
          DB_USER: ${{ secrets.POSTGRES_USER || 'user' }}
          DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'password' }}
        run: |
          mkdir -p "$K8S_KUSTOMIZE_PATH"
          cat > "$K8S_KUSTOMIZE_PATH/secret.yaml" <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: db-secret
          type: Opaque
          stringData:
            POSTGRES_USER: $DB_USER
            POSTGRES_PASSWORD: $DB_PASSWORD
          EOF
          cat "$K8S_KUSTOMIZE_PATH/secret.yaml"
          cat "$K8S_KUSTOMIZE_PATH/secret.yaml"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k "$K8S_KUSTOMIZE_PATH" -n "$K8S_NAMESPACE"

      - name: Update image in deployment
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/todo-app todo-app="$IMAGE_TAG"

      - name: Verify rollout
        run: |
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/todo-app --timeout=180s

      - name: Verify health via ingress
        run: |
          kubectl -n ingress-nginx port-forward svc/ingress-nginx-controller 8081:80 > /tmp/ingress-pf.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 60); do
            RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: todo.local" http://127.0.0.1:8081/api/health/ 2>/dev/null || echo "000")
            if [ "$RESPONSE_CODE" = "200" ]; then
              echo "Ingress health check passed"
              exit 0
            fi
            sleep 2
          done

          echo "Ingress health check failed"
          cat /tmp/ingress-pf.log || true
          exit 1

      - name: Debug cluster state on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide
          kubectl get svc -A
          kubectl get ingress -A

