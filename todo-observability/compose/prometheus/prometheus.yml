global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Всегда доступна цель для проверки стека без приложения
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  # Backend бота на хосте (Docker Desktop / Linux с host-gateway).
  # Если API не запущен — target будет DOWN, это нормально.
  - job_name: todo-app
    metrics_path: /metrics
    static_configs:
      - targets: ["todo.local"]
