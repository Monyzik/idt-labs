apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todo-app.dbDeploymentName" . }}
  labels:
    {{ include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
    app: {{ include "todo-app.dbDeploymentName" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "todo-app.dbDeploymentName" . }}
  template:
    metadata:
      labels:
        {{ include "todo-app.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
        app: {{ include "todo-app.dbDeploymentName" . }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "todo-app.dbDeploymentName" . }}
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.database.port }}
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "todo-app.configMapName" . }}
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-app.dbSecretName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-app.dbSecretName" . }}
                  key: POSTGRES_PASSWORD
          {{- with .Values.database.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.database.persistence.enabled }}
          volumeMounts:
            - name: postgres-data
              mountPath: {{ .Values.database.persistence.mountPath }}
          {{- end }}
      {{- if .Values.database.persistence.enabled }}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "todo-app.dbPvcName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
