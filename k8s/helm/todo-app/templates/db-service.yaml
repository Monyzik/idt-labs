apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-app.dbServiceName" . }}
  labels:
    {{ include "todo-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app: {{ include "todo-app.dbDeploymentName" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.database.port }}
      targetPort: {{ .Values.database.port }}
      name: postgres
