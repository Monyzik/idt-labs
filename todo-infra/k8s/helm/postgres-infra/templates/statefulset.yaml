apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "todo-infra.dbDeploymentName" . }}
  labels:
    {{ include "todo-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
    app: postgres
spec:
  serviceName: {{ include "todo-infra.dbServiceName" . }}
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        {{ include "todo-infra.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
        app: postgres
      {{- with .Values.podAnnotations }}
      annotations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.database.port }}
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.name | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-infra.dbSecretName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-infra.dbSecretName" . }}
                  key: POSTGRES_PASSWORD
          {{- with .Values.database.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: postgres-data
              mountPath: {{ .Values.database.persistence.mountPath }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          {{ include "todo-infra.labels" . | nindent 10 }}
          app.kubernetes.io/component: database
          app: postgres
      spec:
        accessModes:
          {{ toYaml .Values.database.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.database.persistence.size | quote }}
        {{- with .Values.database.persistence.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
