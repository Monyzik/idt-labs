stages:
  - test
  - build
  - deploy

variables:
  DOCKER_BUILDKIT: 1
  BUILDKIT_INLINE_CACHE: 1
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  CONTAINER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  IMAGE_TAG_LATEST: $CI_REGISTRY_IMAGE:latest

  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .cache/pip
    - venv/
    - .docker-cache/


test:
  stage: test
  image: python:3.12-slim
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install --cache-dir $PIP_CACHE_DIR -r requirements.txt
    - pip install pytest pytest-cov
  script:
    - echo "Запуск тестов..."
    - pytest --junitxml=report.xml --cov=. --cov-report=xml:coverage.xml --cov-fail-under=70
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  artifacts:
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

build:
  stage: build
  image: docker:24.0.5
  before_script:
    - apk add --no-cache git
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  services:
    - docker:24.0.5-dind
  script:
    - |
      echo "Сборка Docker образа..."

      if [ ! -f "Dockerfile" ]; then
      echo "Dockerfile не найден"
      exit 1
      fi
      
      docker build \
      -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA \
      --tag $IMAGE_TAG \
      --tag $IMAGE_TAG_LATEST \
      --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
      --build-arg VERSION=$CI_COMMIT_SHA \
      --build-arg COMMIT=$CI_COMMIT_SHA .
      
      echo "Проверка созданного образа..."
      if docker image inspect $IMAGE_TAG > /dev/null 2>&1; then
        echo "Образ успешно создан: $IMAGE_TAG"
      else
        echo "Ошибка: образ не создан"
        exit 1
      fi

      echo "IMAGE_TAG=$IMAGE_TAG" > build.env

  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
      when: on_success

test-build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  needs:
    - build
  before_script:
    - apk add --no-cache docker-cli docker-compose curl
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker rm -f test-db test-app 2>/dev/null || true
  script:
    - |
      echo "Тестирование API"
      
      export POSTGRES_DB=todo_db
      export POSTGRES_USER=user
      export POSTGRES_PASSWORD=password
      export PGADMIN_EMAIL=admin@admin.com
      export PGADMIN_PASSWORD=password
      
      echo "Запускаем PostgreSQL..."
      docker run -d --name test-db \
        -e POSTGRES_DB=test_db \
        -e POSTGRES_USER=test_user \
        -e POSTGRES_PASSWORD=test_password \
        -p 5432:5432 \
        postgres:15-alpine
      
      echo "Ждем 30 секунд для запуска..."
      sleep 20
      
      echo "Запуск контейнера..."
      docker run -d --name test-app \
        --link test-db:db \
        -e DATABASE_URL="postgresql://test_user:test_password@db:5432/test_db" \
        -p 1010:1010 \
        $IMAGE_TAG
      PORT=1010
      
      echo "Ждем 30 секунд для запуска..."
      sleep 30
      
      echo "Проверяем..."
      if curl -s -f http://localhost:1010/health > /dev/null 2>&1; then
        echo "Приложение работает!"
        
        echo "Логи приложения (первые 20 строк):"
        docker logs test-app --tail 20
      else
        echo "Приложение не отвечает"
        docker logs test-app
        exit 1
      fi
      
      docker stop test-app test-db
      docker rm test-app test-db
      echo "Тестирование завершено успешно!"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
      when: on_success


deploy:
  stage: deploy
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      echo "Деплой приложения"
      echo "Образ: $IMAGE_TAG"
      echo "Ветка: $CI_COMMIT_BRANCH"
      echo "Коммит: $CI_COMMIT_SHA"
      echo ""
      echo "Публикация образа..."
      docker push $IMAGE_TAG
      docker push $IMAGE_TAG_LATEST
      echo "Образ опубликован $CONTAINER_IMAGE"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
