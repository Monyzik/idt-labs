stages:
  - test
  - build
  - verify
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  IMAGE_TAG_LATEST: $CI_REGISTRY_IMAGE:latest
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

#cache:
#  key: $CI_COMMIT_REF_SLUG
#  paths:
#    - .cache/pip
#    - venv/


#before_script:
#  - python -m venv venv
#  - source venv/bin/activate
#  - pip install --cache-dir $PIP_CACHE_DIR -r requirements.txt


test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
  script:
    - echo "Запуск тестов..."
    - pytest --junitxml=report.xml --cov=. --cov-report=xml --cov-fail-under=70
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  artifacts:
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - |
      echo "Сборка Docker образа..."

      if [ ! -f "Dockerfile" ]; then
      echo "Dockerfile не найден"
      exit 1
      fi

      docker build \
      --tag $IMAGE_TAG \
      --tag $IMAGE_TAG_LATEST \
      --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
      --build-arg VERSION=$CI_COMMIT_SHA \
      --build-arg COMMIT=$CI_COMMIT_SHA .

      if ! docker images | grep -q "$CI_REGISTRY_IMAGE"; then
      echo "Ошибка создания образа"
      exit 1
      fi

      echo "Образ создан успешно"

      echo "Публикация образа..."
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
      docker push $IMAGE_TAG
      docker push $IMAGE_TAG_LATEST

      echo "IMAGE_TAG=$IMAGE_TAG" > build.env
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
      when: on_success

verify:
  stage: verify
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  needs:
    - build
  before_script:
    - apk add --no-cache curl
  script:
    - |
      echo "Проверка работоспособности образа..."
      
      curl --version
      
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
      docker pull $IMAGE_TAG
      
      echo "Запуск контейнера..."
      CONTAINER_ID=$(docker run -d \
        --rm \
        -p 8000:8000 \
        -e DATABASE_URL=sqlite:///:memory: \
        $IMAGE_TAG)
      
      #      PORT=$(docker port $CONTAINER_ID 8000 | cut -d: -f2)
      #      echo "Контейнер запущен на порту: $PORT"
      
      echo "Ожидание запуска приложения..."
      sleep 30
      
      echo "Проверка health check..."
      if curl -f http://localhost:8000/api/health/; then
      echo "Health check пройден"
      else
      echo "Health check не пройден"
      docker logs $CONTAINER_ID
      exit 1
      fi
      
      echo "Проверка API..."
      if curl -f http://localhost:8000/api/todos/; then
      echo "PI работает"
      else
      echo "API недоступен"
      docker logs $CONTAINER_ID
      exit 1
      fi
      echo "Остановка контейнера..."
      docker stop $CONTAINER_ID
      echo "Образ прошел все проверки"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
      when: on_success

deploy:
  stage: deploy
  script:
    - echo "Deploying $IMAGE_TAG"
    # Здесь ваша логика развертывания
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
