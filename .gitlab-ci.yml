stages:
  - build
  - test

build-job:
  stage: build
  script:
    - echo "Building the application..."
    - mkdir -p build
    - echo "Build successful!" > build/status.txt
  artifacts:
    paths:
      - build/

test-job:
  stage: test
  script:
    - echo "Running tests..."
    - cat build/status.txt
    - echo "Tests passed!"
